<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOCK DAY - LOGIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#151515;--surface2:#202020;--line:#303030;
  --text:#f2f2f2;--muted:#7c7c7c;--mid:#b9b9b9;--accent:#fff;--accentText:#050505;
  --red:#e0584f;--green:#33d17a;--shadow:rgba(0,0,0,.45);
}
html,body{min-height:100%;font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;opacity:.32;
  background:
    linear-gradient(90deg,transparent 0 31px,rgba(255,255,255,.045) 32px),
    linear-gradient(0deg,transparent 0 31px,rgba(255,255,255,.035) 32px);
  background-size:32px 32px;
}
.shell{position:relative;min-height:100vh;display:grid;grid-template-columns:minmax(0,1fr) 440px;align-items:stretch}
.hero{padding:44px clamp(24px,5vw,76px);display:flex;flex-direction:column;justify-content:space-between;gap:42px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px}
.brand{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:6px;color:var(--accent);line-height:1}
.home-link{color:var(--mid);text-decoration:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--line);border-radius:6px;padding:9px 12px;background:rgba(255,255,255,.03)}
.home-link:hover{color:var(--accent);border-color:var(--accent)}
.headline{max-width:820px}
.eyebrow{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(62px,10vw,132px);letter-spacing:8px;line-height:.86;color:var(--accent)}
.copy{max-width:560px;margin-top:22px;color:var(--mid);font-size:13px;line-height:1.8}
.motion-board{position:relative;height:280px;border:1px solid var(--line);background:rgba(18,18,18,.88);box-shadow:0 30px 80px var(--shadow);overflow:hidden}
.hours{position:absolute;inset:18px 18px auto;display:grid;grid-template-columns:repeat(8,1fr);gap:8px;color:var(--muted);font-size:9px;letter-spacing:1px}
.track{position:absolute;left:18px;right:18px;height:42px;border:1px solid #292929;background:#111;overflow:hidden}
.track:nth-of-type(2){top:64px}.track:nth-of-type(3){top:122px}.track:nth-of-type(4){top:180px}
.bar{position:absolute;top:7px;height:26px;border-radius:4px;background:#f5f5f5;color:#080808;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;padding:5px 10px;white-space:nowrap;animation:slide 8s ease-in-out infinite}
.bar.dark{background:#777;color:#fff}.bar.outline{background:transparent;color:#fff;border:1px solid #fff}
.b1{left:7%;width:26%;animation-delay:-1s}.b2{left:42%;width:18%;animation-delay:-2.3s}.b3{left:18%;width:34%;animation-delay:-4s}.b4{left:61%;width:25%;animation-delay:-5.4s}
.now{position:absolute;top:44px;bottom:28px;left:53%;width:1px;background:var(--green);box-shadow:0 0 18px rgba(51,209,122,.75);animation:pulse 1.8s ease-in-out infinite}
@keyframes slide{0%,100%{transform:translateX(0)}50%{transform:translateX(18px)}}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
.panel{background:rgba(15,15,15,.96);border-left:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:28px}
.card{width:100%;max-width:376px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:32px;box-shadow:0 24px 64px var(--shadow)}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:var(--accent);margin-bottom:24px}
.field{margin-bottom:18px}.field-label{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:12px 14px;font-family:'DM Mono',monospace;font-size:12px;border-radius:6px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,255,255,.08)}
.field input::placeholder{color:var(--muted)}
.btn-submit{width:100%;background:var(--accent);color:var(--accentText);border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;border-radius:6px;transition:transform .15s,background .2s;margin-top:8px}
.btn-submit:hover{transform:translateY(-1px);background:#dcdcdc}.btn-submit:disabled{background:#333;color:var(--muted);cursor:not-allowed;transform:none}
.error-msg{background:rgba(224,88,79,.14);border:1px solid rgba(224,88,79,.45);color:#ff7b73;padding:10px 14px;border-radius:6px;font-size:11px;margin-bottom:18px;display:none;letter-spacing:.5px}
.footer-link{text-align:center;margin-top:24px;font-size:11px;color:var(--muted)}.footer-link a{color:var(--accent);text-decoration:none;letter-spacing:.5px}.footer-link a:hover{text-decoration:underline}
@media (max-width:900px){.shell{grid-template-columns:1fr}.panel{border-left:none;border-top:1px solid var(--line)}.hero{min-height:560px}.motion-board{height:230px}}
@media (prefers-reduced-motion:reduce){.bar,.now{animation:none}}
</style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <div class="topbar"><div class="brand">BLOCK DAY</div><a class="home-link" href="/">HOME</a></div>
    <div class="headline">
      <div class="eyebrow">Plan the day by time, not by chaos</div>
      <h1>SIGN IN</h1>
      <p class="copy">Open your day board, see what belongs in every hour, and keep meetings, tasks, notes, and focus in one clean timeline.</p>
    </div>
    <div class="motion-board" aria-hidden="true">
      <div class="hours"><span>6AM</span><span>9AM</span><span>12PM</span><span>3PM</span><span>6PM</span><span>9PM</span><span>12AM</span><span>3AM</span></div>
      <div class="track"><div class="bar b1">DEEP WORK</div><div class="bar dark b2">SYNC</div></div>
      <div class="track"><div class="bar outline b3">BUILD</div></div>
      <div class="track"><div class="bar b4">RESET</div></div>
      <div class="now"></div>
    </div>
  </section>
  <section class="panel">
    <div class="card">
      <div class="card-title">SIGN IN</div>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="field"><div class="field-label">Email</div><input type="email" id="email" placeholder="you@example.com" required autocomplete="email"></div>
        <div class="field"><div class="field-label">Password</div><input type="password" id="password" placeholder="Password" required autocomplete="current-password"></div>
        <button type="submit" class="btn-submit" id="submitBtn">SIGN IN</button>
      </form>
      <div class="footer-link">Don't have an account? <a href="/register.html">Create one</a></div>
    </div>
  </section>
</main>
<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');
form.addEventListener('submit', async (e) => {
  e.preventDefault(); errorMsg.style.display = 'none'; submitBtn.disabled = true; submitBtn.textContent = 'SIGNING IN...';
  try {
    const res = await fetch('/auth/login', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ email:document.getElementById('email').value, password:document.getElementById('password').value }) });
    const data = await res.json();
    if (data.success) window.location.href = '/app';
    else showError(data.error || 'Login failed');
  } catch { showError('Network error - please try again'); }
});
function showError(msg){ errorMsg.textContent = msg; errorMsg.style.display = 'block'; submitBtn.disabled = false; submitBtn.textContent = 'SIGN IN'; }
</script>
</body>
</html>
