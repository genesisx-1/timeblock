<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIND MINE - LOGIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#7fc7ff;--sky2:#c9ecff;--grass:#4f9f3b;--dirt:#815438;--deep:#111614;--surface:#1b211d;--surface2:#273128;--text:#f5f8ef;--muted:#b8c5b3;--lime:#7bd84d;--lime2:#b6ff72;--ink:#0b1209;--red:#ff7b73}
html,body{min-height:100%;font-size:14px}
body{background:var(--deep);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden}
.pixel-bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(var(--sky),var(--sky2) 42%,#5fbf4c 42%,#4c9b37 54%,#6d472f 54%,#3a241a)}
.pixel-bg::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.16) 0 2px,transparent 2px 32px),linear-gradient(0deg,rgba(0,0,0,.1) 0 2px,transparent 2px 32px);background-size:32px 32px;opacity:.48}
.cloud{position:fixed;z-index:-1;background:#fff;height:34px;width:118px;box-shadow:34px -16px 0 #fff,76px 0 0 #fff,136px -8px 0 #fff;opacity:.7;animation:cloud 32s linear infinite}.c1{top:110px;left:-180px}.c2{top:230px;left:-390px;animation-duration:44s;opacity:.55}
@keyframes cloud{to{transform:translateX(calc(100vw + 520px))}}
.shell{min-height:100vh;display:grid;grid-template-columns:minmax(0,1fr) 430px;gap:44px;padding:44px clamp(18px,5vw,70px);align-items:center}
.topbar{position:fixed;top:0;left:0;right:0;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(18px,4vw,58px);background:rgba(17,22,20,.82);backdrop-filter:blur(10px);border-bottom:4px solid rgba(0,0,0,.35);z-index:5}
.brand{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:6px;color:var(--lime2);text-shadow:3px 3px 0 #1d4017}
.home-link,.btn-submit{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;border-radius:0;border:3px solid #172414;box-shadow:4px 4px 0 rgba(0,0,0,.35)}
.home-link{color:var(--text);background:rgba(27,33,29,.78);text-decoration:none;padding:10px 14px}.home-link:hover{background:#2d3a31}
.hero{padding-top:72px}.eyebrow{font-size:10px;letter-spacing:4px;color:#173312;text-transform:uppercase;margin-bottom:18px;font-weight:500}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(74px,11vw,150px);letter-spacing:8px;line-height:.84;color:#fff;text-shadow:6px 6px 0 #214018,10px 10px 0 rgba(0,0,0,.28)}
.copy{max-width:620px;color:#132810;background:rgba(255,255,255,.66);border:4px solid rgba(39,73,29,.38);box-shadow:8px 8px 0 rgba(0,0,0,.18);padding:18px 20px;font-size:13px;line-height:1.85;margin:24px 0}
.mini-world{position:relative;height:250px;max-width:560px;filter:drop-shadow(12px 16px 0 rgba(0,0,0,.2))}
.cube{position:absolute;width:64px;height:64px;background:var(--grass);border:4px solid rgba(0,0,0,.28);box-shadow:inset 0 14px 0 rgba(255,255,255,.13),inset 0 -14px 0 rgba(0,0,0,.13)}
.dirt{background:var(--dirt)}.stone{background:#575b60}.leaf{background:#2e7d32}.wood{background:#744525}.c1b{left:40px;top:80px}.c2b{left:104px;top:80px}.c3b{left:168px;top:80px}.c4b{left:232px;top:80px}.c5b{left:104px;top:144px}.c6b{left:168px;top:144px}.c7b{left:232px;top:144px}.ore{position:absolute;left:184px;top:160px;width:14px;height:14px;background:var(--lime2);box-shadow:34px 16px 0 var(--lime),72px -8px 0 var(--lime2);animation:spark 1.8s infinite}
.tree{position:absolute;left:345px;top:0}.tree .wood{left:45px;top:96px}.tree .leaf.l1{left:0;top:32px}.tree .leaf.l2{left:64px;top:32px}.tree .leaf.l3{left:32px;top:-32px}
@keyframes spark{0%,100%{opacity:.45}50%{opacity:1}}
.panel{padding-top:72px}.card{background:var(--surface);border:4px solid #0c100d;box-shadow:10px 10px 0 rgba(0,0,0,.32);padding:30px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;color:var(--lime2);text-shadow:3px 3px 0 #183111;margin-bottom:24px}
.field{margin-bottom:18px}.field-label{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.field input{width:100%;background:var(--surface2);border:3px solid #0c100d;color:var(--text);padding:12px 14px;font-family:'DM Mono',monospace;font-size:12px;outline:none;border-radius:0}
.field input:focus{border-color:var(--lime2)}.field input::placeholder{color:#8fa086}
.btn-submit{width:100%;background:var(--lime2);color:var(--ink);padding:14px;font-size:18px;cursor:pointer;margin-top:8px}.btn-submit:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,.35)}.btn-submit:disabled{background:#31412d;color:#8fa086;cursor:not-allowed}
.error-msg{background:rgba(224,88,79,.18);border:3px solid rgba(80,18,15,.65);color:var(--red);padding:10px 14px;font-size:11px;margin-bottom:18px;display:none}
.footer-link{text-align:center;margin-top:24px;font-size:11px;color:var(--muted)}.footer-link a{color:var(--lime2);text-decoration:none}.footer-link a:hover{text-decoration:underline}
@media(max-width:900px){.shell{grid-template-columns:1fr}.panel{padding-top:0}.mini-world{transform:scale(.82);transform-origin:left top;height:210px}}
@media(prefers-reduced-motion:reduce){.cloud,.ore{animation:none}}
</style>
</head>
<body>
<div class="pixel-bg"></div><div class="cloud c1"></div><div class="cloud c2"></div>
<div class="topbar"><div class="brand">MIND MINE</div><a class="home-link" href="/">HOME</a></div>
<main class="shell">
  <section class="hero">
    <div class="eyebrow">Return to your base</div>
    <h1>SIGN IN</h1>
    <p class="copy">Jump back into Mind Mine and keep building your day block by block.</p>
    <div class="mini-world" aria-hidden="true">
      <div class="cube c1b"></div><div class="cube c2b"></div><div class="cube c3b"></div><div class="cube c4b"></div><div class="cube dirt c5b"></div><div class="cube stone c6b"></div><div class="cube dirt c7b"></div><div class="ore"></div>
      <div class="tree"><div class="cube leaf l1"></div><div class="cube leaf l2"></div><div class="cube leaf l3"></div><div class="cube wood"></div></div>
    </div>
  </section>
  <section class="panel">
    <div class="card">
      <div class="card-title">SIGN IN</div>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="field"><div class="field-label">Email</div><input type="email" id="email" placeholder="you@example.com" required autocomplete="email"></div>
        <div class="field"><div class="field-label">Password</div><input type="password" id="password" placeholder="Password" required autocomplete="current-password"></div>
        <button type="submit" class="btn-submit" id="submitBtn">SIGN IN</button>
      </form>
      <div class="footer-link">Don't have an account? <a href="/register.html">Create one</a></div>
    </div>
  </section>
</main>
<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');
form.addEventListener('submit', async (e) => {
  e.preventDefault(); errorMsg.style.display = 'none'; submitBtn.disabled = true; submitBtn.textContent = 'SIGNING IN...';
  try {
    const res = await fetch('/auth/login', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ email:document.getElementById('email').value, password:document.getElementById('password').value }) });
    const data = await res.json();
    if (data.success) window.location.href = '/app';
    else showError(data.error || 'Login failed');
  } catch { showError('Network error - please try again'); }
});
function showError(msg){ errorMsg.textContent = msg; errorMsg.style.display = 'block'; submitBtn.disabled = false; submitBtn.textContent = 'SIGN IN'; }
</script>
</body>
</html>
